global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'glances_exporter'  
    scrape_interval: 5s
    static_configs:
      - targets: ['glances:9091']

  - job_name: 'litellm'
    scrape_interval: 10s    
    # Utilisation du nom du service Docker défini dans votre docker-compose
    static_configs:
      - targets: ['litellm:4000']

  - job_name: 'qdrant'
    scrape_interval: 10s    
    # Utilisation du nom du service Docker défini dans votre docker-compose
    static_configs:
      - targets: ['qdrant:6333']

   
  - job_name: 'hwinfo-promdapter'
    static_configs:
      - targets: ['host.docker.internal:10445']

